name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read Bundle ID
        run: |
          BUNDLE_ID=$(grep -o 'id="[^"]*"' config.xml | head -1 | cut -d'"' -f2)
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          echo "Bundle ID is $BUNDLE_ID"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add iOS platform
        run: cordova platform add ios

      # 🔥
      - name: Build iOS (Release no signing)
        run: |
          cd platforms/ios
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            build \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon

      # 🔥
      - name: Create IPA
        run: |
          cd platforms/ios
          mkdir Payload
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r "$BUNDLE_ID.ipa" Payload
          mv "$BUNDLE_ID.ipa" ../../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_ID }}.ipa
          path: ${{ env.BUNDLE_ID }}.ipa
