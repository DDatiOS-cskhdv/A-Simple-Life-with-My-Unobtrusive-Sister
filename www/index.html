<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="user-scalable=no">
    <link rel="icon" href="icon/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon/icon.png">
    <link rel="stylesheet" href="fonts/gamefont.css">
    <title>A Simple Life with My Unobtrusive Sister ver0.99</title>
</head>

<body style="background-color:#000">
    <script>
        // Node.js polyfill: prevent TypeError when plugins call require('fs').existsSync() etc. on iOS
        if (typeof require === 'undefined') {
            var _noop = function() {};
            var _fakeFs = {
                existsSync: function() { return false; },
                readFileSync: function() { return ''; },
                writeFileSync: _noop, appendFileSync: _noop,
                mkdirSync: _noop, unlinkSync: _noop, copyFileSync: _noop,
                readdirSync: function() { return []; },
                statSync: function() { return { isFile: function() { return false; }, isDirectory: function() { return false; }, size: 0 }; },
                stat: function(p, cb) { cb && cb(new Error('ENOENT')); },
                promises: { readFile: function() { return Promise.resolve(''); }, writeFile: function() { return Promise.resolve(); }, mkdir: function() { return Promise.resolve(); }, readdir: function() { return Promise.resolve([]); } }
            };
            var _fakePath = {
                join: function() { return Array.prototype.slice.call(arguments).join('/').replace(/\/+/g, '/'); },
                dirname: function(p) { return (p || '').replace(/[\/\\][^\/\\]*$/, '') || '.'; },
                resolve: function() { return Array.prototype.slice.call(arguments).join('/'); },
                normalize: function(p) { return p || ''; },
                extname: function(p) { return ((p || '').match(/\.[^.]*$/) || [''])[0]; },
                basename: function(p) { return (p || '').split(/[\/\\]/).pop(); },
                isAbsolute: function() { return false; }
            };
            var _fakeChild = { exec: _noop, execSync: _noop, spawn: function() { return { stdout: { on: _noop }, stderr: { on: _noop }, on: _noop }; } };
            var _fakeOs = { platform: function() { return 'ios'; }, tmpdir: function() { return '/tmp'; }, cpus: function() { return []; } };
            var _fakeHttp = { createServer: function() { return { listen: _noop, on: _noop, close: _noop }; } };
            var _fakeWin = { isDevToolsOpen: function() { return false; }, showDevTools: _noop, maximize: _noop, minimize: _noop, close: _noop, on: _noop };
            var _fakeNwGui = { Shell: { openExternal: _noop, openItem: _noop }, Window: { get: function() { return _fakeWin; } } };
            var _modMap = { fs: _fakeFs, path: _fakePath, 'child_process': _fakeChild, os: _fakeOs, http: _fakeHttp, 'nw.gui': _fakeNwGui, '@nwjs/nwjs': _fakeNwGui };
            window.require = function(mod) { return _modMap[mod] || {}; };
            window.process = { platform: 'ios', cwd: function() { return '/'; }, execPath: '/', env: {}, mainModule: { filename: '/index.html' } };
            window.nw = window.nw || { App: { argv: [], clearCache: _noop, quit: _noop, dataPath: '/', manifest: {} }, Window: { get: function() { return _fakeWin; } }, Shell: { openExternal: _noop, openItem: _noop } };
        }
    </script>
    <script>
        window.requestIdleCallback = window.requestIdleCallback || function(cb, options) {
            var timeout = (options && options.timeout) ? Math.min(options.timeout, 50) : 50;
            return setTimeout(function() {
                cb({ didTimeout: false, timeRemaining: function() { return 50; } });
            }, timeout > 50 ? 50 : timeout);
        };
        window.cancelIdleCallback = window.cancelIdleCallback || function(id) {
            clearTimeout(id);
        };
    </script>
    <script>
        (function() {
            var log = [];
            function showError(msg) {
                log.push(msg);
                var el = document.getElementById('_err');
                if (!el) {
                    el = document.createElement('div');
                    el.id = '_err';
                    el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);color:#ff4444;font:13px monospace;padding:12px;overflow:auto;z-index:99999;white-space:pre-wrap;word-break:break-all;';
                    document.body.appendChild(el);
                }
                el.textContent = log.join('\n\n');
            }
            window.onerror = function(msg, src, line, col, err) {
                showError('[JS ERROR]\n' + msg + '\nat ' + src + ':' + line + ':' + col + (err ? '\n' + err.stack : ''));
                return false;
            };
            window.addEventListener('unhandledrejection', function(e) {
                showError('[UNHANDLED PROMISE]\n' + (e.reason ? (e.reason.stack || e.reason) : e));
            });
        })();
    </script>
    <script src="js/main.js"></script>
</body>

</html>
